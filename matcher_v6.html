<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>브랜드앤유 | 인플루언서 매칭 판별기 v6</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#eef0f6;color:#1a1a2e;min-height:100vh;}

.header{background:linear-gradient(135deg,#0f1f4a,#1e3a6e);color:white;padding:22px 36px;box-shadow:0 4px 20px rgba(15,31,74,.35);}
.header h1{font-size:21px;font-weight:800;}
.header p{font-size:12px;opacity:.6;margin-top:4px;}
.badge{background:#e8b84b;color:#0f1f4a;font-size:10px;font-weight:900;padding:2px 8px;border-radius:20px;margin-left:7px;vertical-align:middle;}
.real-badge{background:#2e7d32;color:white;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;margin-left:5px;vertical-align:middle;}

.container{max-width:1200px;margin:0 auto;padding:22px 16px;}

/* ── 메인 검색 박스 ── */
.search-box{background:white;border-radius:20px;padding:28px 32px;box-shadow:0 4px 24px rgba(0,0,0,.09);margin-bottom:20px;}
.search-label{font-size:13px;font-weight:800;color:#0f1f4a;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.search-row{display:flex;gap:12px;align-items:stretch;}
.brand-input{flex:1;padding:16px 20px;border:2.5px solid #e0e0e0;border-radius:14px;font-size:17px;font-weight:600;font-family:inherit;background:#fafafa;transition:border .15s,box-shadow .15s;color:#0f1f4a;}
.brand-input:focus{outline:none;border-color:#0f1f4a;background:white;box-shadow:0 0 0 4px rgba(15,31,74,.06);}
.brand-input::placeholder{font-weight:400;color:#bbb;}
.search-btn{padding:16px 32px;background:#0f1f4a;color:white;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;transition:background .15s;white-space:nowrap;letter-spacing:-.3px;}
.search-btn:hover{background:#1e3a6e;}
.search-btn:active{transform:scale(.98);}

/* ── 분석 결과 카드 (자동 매핑 표시) ── */
.analysis-card{background:#f0f4ff;border:1.5px solid #c5cae9;border-radius:14px;padding:16px 20px;margin-top:14px;display:none;}
.analysis-card.visible{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.ac-title{font-size:11px;font-weight:800;color:#3949ab;margin-right:4px;}
.ac-tag{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.tag-cat{background:#e3f2fd;color:#1565c0;}
.tag-kw{background:#fff9e6;color:#e65100;}
.tag-target{background:#e8f5e9;color:#2e7d32;}
.tag-tone{background:#f3e5f5;color:#7b1fa2;}
.ac-unknown{background:#fff3e0;color:#e65100;border:1px solid #ffcc80;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:700;width:100%;}

/* ── 빠른 선택 ── */
.quick-panel{background:white;border-radius:16px;padding:18px 24px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:20px;}
.quick-title{font-size:13px;font-weight:700;color:#888;margin-bottom:10px;}
.quick-grid{display:flex;flex-wrap:wrap;gap:6px;}
.qbtn{padding:6px 12px;border-radius:24px;border:1.5px solid #c8e6c9;background:#f1f8e9;font-size:11px;font-weight:700;cursor:pointer;color:#2e7d32;transition:all .12s;}
.qbtn:hover{background:#a5d6a7;border-color:#81c784;}

/* ── DB 배너 ── */
.db-banner{background:#e8f5e9;border:1.5px solid #a5d6a7;border-radius:12px;padding:12px 18px;margin-bottom:18px;font-size:12px;color:#1b5e20;display:flex;align-items:center;gap:10px;}

/* ── 결과 ── */
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.result-header h2{font-size:18px;font-weight:800;color:#0f1f4a;}
.result-sub{font-size:11px;color:#aaa;}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.ldot{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:white;flex-shrink:0;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#555;}

.infl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;}

/* ── 카드 ── */
.card{background:white;border-radius:15px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.07);border:2px solid transparent;transition:all .18s;position:relative;}
.card:hover{border-color:#e8b84b;transform:translateY(-2px);box-shadow:0 8px 26px rgba(0,0,0,.12);}
.card.grade-s{border-left:4px solid #e8b84b;}
.card.grade-a{border-left:4px solid #1e88e5;}
.card.grade-b{border-left:4px solid #43a047;}
.card.grade-c{border-left:4px solid #bdbdbd;}

.rank-dot{position:absolute;top:13px;left:16px;width:22px;height:22px;border-radius:50%;background:#0f1f4a;color:white;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;}
.score-ring{position:absolute;top:11px;right:11px;width:50px;height:50px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;}
.gs{background:linear-gradient(135deg,#e8b84b,#f0a500);color:#fff;}
.ga{background:linear-gradient(135deg,#1e88e5,#1565c0);color:#fff;}
.gb{background:linear-gradient(135deg,#43a047,#2e7d32);color:#fff;}
.gc{background:#9e9e9e;color:white;}
.snum{font-size:16px;line-height:1;}
.slbl{font-size:7.5px;opacity:.9;margin-top:1px;}

.profile{display:flex;align-items:center;gap:12px;margin:34px 0 12px;padding-right:54px;}
.avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.av1{background:radial-gradient(circle,#fce4ec,#f48fb1);}
.av2{background:radial-gradient(circle,#e8f5e9,#81c784);}
.av3{background:radial-gradient(circle,#e3f2fd,#64b5f6);}
.av4{background:radial-gradient(circle,#fff8e1,#ffcc02);}
.av5{background:radial-gradient(circle,#f3e5f5,#ce93d8);}
.av6{background:radial-gradient(circle,#e0f7fa,#4dd0e1);}
.av7{background:radial-gradient(circle,#fbe9e7,#ff8a65);}
.av8{background:radial-gradient(circle,#f5f5f5,#bdbdbd);}

.pname{font-size:15px;font-weight:800;color:#0f1f4a;}
.pig a{color:#4a6fa5;font-weight:700;font-size:12px;text-decoration:none;}
.pig a:hover{text-decoration:underline;}
.pcat{font-size:10px;color:#999;margin-top:3px;line-height:1.5;}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px;}
.stat{background:#f7f8fb;border-radius:8px;padding:7px 5px;text-align:center;}
.slabel{font-size:8.5px;color:#aaa;font-weight:700;text-transform:uppercase;margin-bottom:3px;}
.sval{font-size:12px;font-weight:800;color:#0f1f4a;line-height:1;}

/* 점수 바 */
.match-bars{margin-bottom:10px;}
.mbar-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.mbar-label{font-size:9px;color:#aaa;width:60px;flex-shrink:0;font-weight:700;}
.mbar-track{flex:1;height:6px;background:#f0f0f0;border-radius:6px;overflow:hidden;}
.mbar-fill{height:100%;border-radius:6px;}
.fill-cat{background:linear-gradient(90deg,#e8b84b,#f0a500);}
.fill-kw{background:linear-gradient(90deg,#1e88e5,#42a5f5);}
.fill-target{background:linear-gradient(90deg,#43a047,#81c784);}
.fill-collab{background:linear-gradient(90deg,#8e24aa,#ce93d8);}
.fill-scale{background:linear-gradient(90deg,#ef6c00,#ffa726);}
.mbar-pts{font-size:9px;font-weight:800;color:#555;width:26px;text-align:right;flex-shrink:0;}

.why{border-top:1px solid #f0f0f0;padding-top:10px;}
.why-title{font-size:10px;font-weight:800;color:#0f1f4a;margin-bottom:7px;display:flex;align-items:center;gap:4px;}
.why-title::before{content:'';display:inline-block;width:3px;height:11px;background:#e8b84b;border-radius:2px;}
.why-list{display:flex;flex-direction:column;gap:4px;}
.why-item{font-size:11px;color:#444;line-height:1.55;display:flex;gap:5px;align-items:flex-start;}
.why-check{color:#e8b84b;font-weight:900;flex-shrink:0;font-size:10px;margin-top:1px;}
.mkw{background:#fff9e6;color:#e65100;font-weight:700;padding:0 2px;border-radius:3px;font-size:10px;}

.empty{text-align:center;padding:70px 20px;color:#ccc;}
.empty .eicon{font-size:56px;margin-bottom:14px;}
.empty p{font-size:14px;line-height:1.8;}

@media(max-width:700px){
  .search-row{flex-direction:column;}
  .infl-grid{grid-template-columns:1fr;}
  .stats{grid-template-columns:repeat(2,1fr);}
  .header{padding:16px;}
  .container{padding:10px;}
}
</style>
</head>

   cat:'스킨케어', kws:'바디케어 샤워기필터 바디워시 셀프케어 욕실 보습', target:'2030', tone:'감성라이프'},
];

// 제조사명 자동 분석
function analyzeBrand(brandName) {
  if (!brandName || brandName.trim().length < 1) return null;
  const lower = brandName.toLowerCase().replace(/\s/g,'');

  // 1. 발송 완료 60개사 정확 매칭
  const exact = BRANDS.find(b => {
    const bn = b.brand.toLowerCase().replace(/\s/g,'');
    return bn === lower || bn.includes(lower) || lower.includes(bn.replace(/[()（）]/g,''));
  });
  if (exact) {
    const CAT_MAP = {
      '뷰티·스킨케어':'스킨케어','뷰티·더마':'의학더마','뷰티·메이크업':'메이크업',
      '건강·이너뷰티':'이너뷰티','헤어케어':'헤어케어','자연주의·친환경':'친환경비건',
      '생활용품·홈케어':'살림홈케어','육아용품':'육아','바디케어':'스킨케어','뷰티·기기':'스킨케어',
    };
    const TARGET_MAP = {
      '이너뷰티':['약사의사','신뢰전문'], '의학더마':['성분덕후','신뢰전문'],
      '헤어케어':['3040','리얼리뷰'], '살림홈케어':['라이프스타일','공구전문'],
      '친환경비건':['라이프스타일','친환경'], '육아':['3040','육아맘'],
      '메이크업':['2030','감성라이프'], '스킨케어':['성분덕후','리얼리뷰'],
    };
    const cat = CAT_MAP[exact.cat] || '스킨케어';
    const [target, tone] = TARGET_MAP[cat] || ['',''];
    return {
      brand: exact.brand,
      cat, kws: exact.kw, target, tone,
      source: '발송완료 DB', confidence: 'high',
    };
  }

  // 2. 사전 키워드 매칭
  for (const entry of BRAND_DICT) {
    const matched = entry.keys.find(k => lower.includes(k.toLowerCase().replace(/\s/g,'')));
    if (matched) {
      return {
        brand: brandName,
        cat: entry.cat, kws: entry.kws, target: entry.target, tone: entry.tone,
        source: '키워드 사전', confidence: 'medium',
      };
    }
  }

  // 3. 브랜드명 내 키워드로 추론
  const infer = inferFromName(lower);
  if (infer) return { brand: brandName, ...infer, source: '이름 추론', confidence: 'low' };

  // 4. 분석 불가 — 스킨케어 기본값
  return {
    brand: brandName,
    cat: '스킨케어', kws: brandName, target: '', tone: '',
    source: '기본값', confidence: 'unknown',
  };
}

function inferFromName(name) {
  if (/탈모|두피|헤어|샴푸|모발/.test(name)) return {cat:'헤어케어', kws:'탈모 두피 헤어케어 샴푸', target:'3040', tone:'리얼리뷰'};
  if (/살림|세제|청소|세탁|주방/.test(name)) return {cat:'살림홈케어', kws:'살림 세제 청소 홈케어', target:'라이프스타일', tone:'공구전문'};
  if (/콜라겐|유산균|영양|건강|이너|약사|비타민/.test(name)) return {cat:'이너뷰티', kws:'이너뷰티 건강기능식품 콜라겐 영양제', target:'약사의사', tone:'신뢰전문'};
  if (/육아|신생아|아기|맘|임산부/.test(name)) return {cat:'육아', kws:'육아 신생아 육아맘', target:'3040', tone:'육아맘'};
  if (/비건|친환경|오가닉|유기농|자연/.test(name)) return {cat:'친환경비건', kws:'비건 친환경 자연주의 오가닉', target:'라이프스타일', tone:'친환경'};
  if (/더마|피부과|의학|임상|클리닉/.test(name)) return {cat:'의학더마', kws:'더마 피부과 민감피부 진정', target:'성분덕후', tone:'신뢰전문'};
  if (/메이크업|색조|틴트|립|아이섀/.test(name)) return {cat:'메이크업', kws:'메이크업 색조 립 틴트', target:'2030', tone:'감성라이프'};
  return null;
}

function parseF(s){
  if(!s)return 0;
  s=String(s).replace(/\s/g,'');
  const m=s.match(/[\d.]+/);
  if(!m)return 0;
  const n=parseFloat(m[0]);
  return s.includes('만')?n*10000:n;
}

function getGrade(s){
  if(s>=80)return{g:'S',lbl:'최우선',cls:'gs'};
  if(s>=65)return{g:'A',lbl:'강력추천',cls:'ga'};
  if(s>=50)return{g:'B',lbl:'추천',cls:'gb'};
  return{g:'C',lbl:'참고',cls:'gc'};
}

function getAvatar(cat){
  if(/헤어|탈모/.test(cat))return{e:'💆',c:'av2'};
  if(/건강|약사|이너|영양|면역/.test(cat))return{e:'💊',c:'av3'};
  if(/살림|세제|홈케어|인테리어/.test(cat))return{e:'🧹',c:'av4'};
  if(/육아|맘|신생아/.test(cat))return{e:'👶',c:'av5'};
  if(/다이어트|운동|피트니스/.test(cat))return{e:'🥗',c:'av6'};
  if(/친환경|비건|자연/.test(cat))return{e:'🌿',c:'av7'};
  if(/색조|메이크업|GRWM/.test(cat))return{e:'🎨',c:'av1'};
  if(/더마|피부과|의학/.test(cat))return{e:'🔬',c:'av3'};
  return{e:'💄',c:'av1'};
}

function scoreOne(infl, analysis) {
  const hay = [infl.category||'',infl.note||'',infl.giveaway||'',infl.fit||''].join(' ').toLowerCase();
  const catKw = CAT_KW[analysis.cat] || [];
  const userKw = (analysis.kws||'').split(/\s+/).filter(k=>k.length>=2);

  // 1. 카테고리 (35점)
  const catM = catKw.filter(k=>hay.includes(k.toLowerCase()));
  const catScore = catM.length>=4?35:catM.length>=2?25:catM.length===1?15:0;
  if (catScore===0) return null;

  // 2. 키워드 (25점)
  const kwM = userKw.filter(k=>hay.includes(k.toLowerCase()));
  const kwScore = kwM.length>0 ? Math.min(25,kwM.length*9) : Math.round(catScore*0.4);

  // 3. 타겟·톤 (20점)
  let targetScore=0, toneScore=0;
  if (analysis.target && TARGET_KW[analysis.target]) {
    const tM=TARGET_KW[analysis.target].filter(k=>hay.includes(k.toLowerCase()));
    targetScore=Math.min(10,tM.length*4);
  }
  if (analysis.tone && TONE_KW[analysis.tone]) {
    const nM=TONE_KW[analysis.tone].filter(k=>hay.includes(k.toLowerCase()));
    toneScore=Math.min(10,nM.length*4);
  }

  // 4. 공구이력 (15점)
  const gw=infl.giveaway||'',nt=infl.note||'';
  let collabScore=0;
  if(gw.includes('매우 활발')||nt.includes('최다')||nt.includes('풍부')||gw.includes('다수')||gw.includes('매우'))collabScore=15;
  else if(gw.includes('공구')||nt.includes('공구'))collabScore=8;

  // 5. 팔로워 (5점)
  const f=parseF(infl.followers);
  const scaleScore=f>=200000?5:f>=100000?4:f>=50000?3:f>=10000?2:1;

  const total=catScore+kwScore+targetScore+toneScore+collabScore+scaleScore;
  const bd={cat:catScore,kw:kwScore,target:targetScore+toneScore,collab:collabScore,scale:scaleScore};
  const reasons=[];
  if(catM.length>0)reasons.push('카테고리 일치: '+catM.slice(0,3).join(', '));
  if(kwM.length>0)reasons.push('키워드 일치: '+kwM.slice(0,3).join(', '));
  if(targetScore+toneScore>0)reasons.push('타겟·분위기 일치');
  if(collabScore>=15)reasons.push('공구 매우 활발 — 검증된 판매력');
  else if(collabScore>0)reasons.push('공구 이력 있음');

  return {score:total, breakdown:bd, reasons, matchedKws:[...new Set([...catM,...kwM])]};
}

// ── 검색 실행 ──
function runSearch() {
  const val = document.getElementById('brand-input').value.trim();
  if (!val) { alert('제조사명을 입력하세요.'); return; }
  const analysis = lastAnalysis || analyzeBrand(val);
  if (!analysis) return;

  // 분석 카드 표시 (검색 버튼 클릭 시에도)
  onBrandInput(val);

  const results = DB
    .map(infl => {
      const r = scoreOne(infl, analysis);
      if (!r) return null;
      return {...infl, ...r};
    })
    .filter(Boolean)
    .sort((a,b)=>b.score-a.score)
    .slice(0,12);

  renderResults(analysis, results);
}

// ── 결과 렌더링 ──
function renderResults(analysis, results) {
  const area = document.getElementById('result-area');
  if (!results.length) {
    area.innerHTML='<div class="empty"><div class="eicon">🔍</div><p>조건에 맞는 인플루언서가 없습니다.<br>다른 제조사명이나 키워드로 시도해보세요.</p></div>';
    return;
  }
  const allKw=(analysis.kws||'').split(/\s+/).concat(CAT_KW[analysis.cat]||[]).map(k=>k.toLowerCase()).filter(k=>k.length>=2);
  area.innerHTML=
    '<div class="result-header">'+
      '<h2>'+analysis.brand+' — 추천 인플루언서 <span style="color:#e8b84b">'+results.length+'명</span></h2>'+
      '<span class="result-sub">'+DB.length+'명 실제 계정 DB · 5차원 자동 매칭 · 점수 높은 순</span>'+
    '</div>'+

      '<span class="legend-item"><span class="ldot gs">S</span> 최우선(80+)</span>'+

    '<div class="infl-grid">'+results.map((m,i)=>renderCard(m,i+1,allKw)).join('')+'</div>';

function pct(v,mx){return Math.round(v/mx*100)+'%';}

function hl(text,kwList){
  let t=String(text||'');
  kwList.forEach(k=>{
    if(k.length<2)return;
    const re=new RegExp('('+k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
    t=t.replace(re,'<span class="mkw">$1</span>');
  });
  return t;
}

  return '<div class="card grade-'+g.g.toLowerCase()+'">'+

    '<div class="profile">'+

        '<div class="pcat">'+hl((m.category||'').substring(0,40),kwList)+'</div>'+
      '</div>'+
    '</div>'+
    '<div class="stats">'+
      '<div class="stat"><div class="slabel">팔로워</div><div class="sval">'+(m.followers||'-')+'</div></div>'+
      '<div class="stat"><div class="slabel">릴스</div><div class="sval">'+(m.reels||'-')+'</div></div>'+

    '</div>'+
    '<div class="match-bars">'+
      bars.map(b=>'<div class="mbar-row"><div class="mbar-label">'+b.lbl+'</div><div class="mbar-track"><div class="mbar-fill '+b.cls+'" style="width:'+pct(b.v,b.mx)+'"></div></div><div class="mbar-pts">'+b.v+'</div></div>').join('')+
    '</div>'+
    '<div class="why">'+
      '<div class="why-title">이 제조사에 적합한 이유</div>'+
      '<div class="why-list">'+
        m.reasons.slice(0,3).map(r=>'<div class="why-item"><span class="why-check">✓</span>'+hl(r,kwList)+'</div>').join('')+
        (m.note?'<div class="why-item"><span class="why-check">✓</span>'+hl((m.note||'').substring(0,55),kwList)+'</div>':'')+
      '</div>'+
    '</div>'+
  '</div>';
}

// ── 빠른 선택 버튼 ──
document.getElementById('quick-grid').innerHTML=BRANDS.map(b=>
  '<button class="qbtn" onclick="quickPick('+b.no+')">'+b.brand+'</button>'
).join('');

function quickPick(no){
  const b=BRANDS.find(x=>x.no===no);
  if(!b)return;
  document.getElementById('brand-input').value=b.brand;
  onBrandInput(b.brand);
  setTimeout(runSearch,50);
}
</script>
</body>
</html>
