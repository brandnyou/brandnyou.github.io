<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>브랜드앤유 | 인플루언서 매칭 판별기 v10</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#eef0f6;color:#1a1a2e;min-height:100vh;}
.header{background:linear-gradient(135deg,#0f1f4a,#1e3a6e);color:white;padding:22px 36px;box-shadow:0 4px 20px rgba(15,31,74,.35);}
.header h1{font-size:21px;font-weight:800;}
.header p{font-size:12px;opacity:.6;margin-top:4px;}
.badge{background:#e8b84b;color:#0f1f4a;font-size:10px;font-weight:900;padding:2px 8px;border-radius:20px;margin-left:7px;vertical-align:middle;}
.real-badge{background:#2e7d32;color:white;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;margin-left:5px;vertical-align:middle;}
.container{max-width:1200px;margin:0 auto;padding:22px 16px;}

/* 검색박스 */
.search-box{background:white;border-radius:20px;padding:28px 32px;box-shadow:0 4px 24px rgba(0,0,0,.09);margin-bottom:16px;}
.search-label{font-size:13px;font-weight:800;color:#0f1f4a;margin-bottom:10px;}
.search-row{display:flex;gap:12px;align-items:stretch;}
.brand-input{flex:1;padding:16px 20px;border:2.5px solid #e0e0e0;border-radius:14px;font-size:17px;font-weight:600;font-family:inherit;background:#fafafa;transition:border .15s;color:#0f1f4a;}
.brand-input:focus{outline:none;border-color:#0f1f4a;background:white;box-shadow:0 0 0 4px rgba(15,31,74,.06);}
.brand-input::placeholder{font-weight:400;color:#bbb;}
.search-btn{padding:16px 32px;background:#0f1f4a;color:white;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;white-space:nowrap;}
.search-btn:hover{background:#1e3a6e;}

/* 분석결과 카드 */
.analysis-card{border-radius:14px;padding:16px 20px;margin-top:14px;display:none;flex-wrap:wrap;gap:10px;align-items:center;}
.analysis-card.visible{display:flex;}
.ac-found{background:#f0f4ff;border:1.5px solid #c5cae9;}
.ac-unknown{background:#fff8e1;border:1.5px solid #ffe082;}
.ac-title{font-size:11px;font-weight:800;color:#3949ab;margin-right:4px;white-space:nowrap;}
.ac-title-warn{font-size:11px;font-weight:800;color:#e65100;margin-right:4px;}
.ac-tag{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.tag-cat{background:#e3f2fd;color:#1565c0;}
.tag-kw{background:#fff9e6;color:#e65100;}
.tag-target{background:#e8f5e9;color:#2e7d32;}
.tag-tone{background:#f3e5f5;color:#7b1fa2;}
.conf-label{font-size:10px;margin-left:6px;font-weight:700;}

/* 카테고리 선택 UI (알 수 없을 때) */
.cat-picker{width:100%;margin-top:6px;}
.cat-picker-title{font-size:12px;font-weight:800;color:#e65100;margin-bottom:8px;}
.cat-btns{display:flex;flex-wrap:wrap;gap:6px;}
.cat-btn{padding:7px 14px;border-radius:20px;border:2px solid #e0e0e0;background:white;font-size:12px;font-weight:700;cursor:pointer;color:#555;transition:all .12s;}
.cat-btn:hover,.cat-btn.active{background:#0f1f4a;color:white;border-color:#0f1f4a;}

/* 빠른선택 */
.quick-panel{background:white;border-radius:16px;padding:18px 24px;box-shadow:0 2px 12px rgba(0,0,0,.06);margin-bottom:18px;}
.quick-title{font-size:13px;font-weight:700;color:#888;margin-bottom:10px;}
.quick-grid{display:flex;flex-wrap:wrap;gap:6px;}
.qbtn{padding:6px 12px;border-radius:24px;border:1.5px solid #c8e6c9;background:#f1f8e9;font-size:11px;font-weight:700;cursor:pointer;color:#2e7d32;transition:all .12s;}
.qbtn:hover{background:#a5d6a7;}

/* DB 배너 */
.db-banner{background:#e8f5e9;border:1.5px solid #a5d6a7;border-radius:12px;padding:12px 18px;margin-bottom:18px;font-size:12px;color:#1b5e20;display:flex;align-items:center;gap:10px;}

/* 결과 */
.result-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.result-header h2{font-size:18px;font-weight:800;color:#0f1f4a;}
.result-sub{font-size:11px;color:#aaa;}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;}
.ldot{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:900;color:white;flex-shrink:0;}
.legend-item{display:flex;align-items:center;gap:4px;font-size:11px;color:#555;}
.infl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;}

/* 카드 */
.card{background:white;border-radius:15px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.07);border:2px solid transparent;transition:all .18s;position:relative;}
.card:hover{border-color:#e8b84b;transform:translateY(-2px);box-shadow:0 8px 26px rgba(0,0,0,.12);}
.card.grade-s{border-left:4px solid #e8b84b;}
.card.grade-a{border-left:4px solid #1e88e5;}
.card.grade-b{border-left:4px solid #43a047;}
.card.grade-c{border-left:4px solid #bdbdbd;}
.rank-dot{position:absolute;top:13px;left:16px;width:22px;height:22px;border-radius:50%;background:#0f1f4a;color:white;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center;}
.score-ring{position:absolute;top:11px;right:11px;width:50px;height:50px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;}
.gs{background:linear-gradient(135deg,#e8b84b,#f0a500);color:#fff;}
.ga{background:linear-gradient(135deg,#1e88e5,#1565c0);color:#fff;}
.gb{background:linear-gradient(135deg,#43a047,#2e7d32);color:#fff;}
.gc{background:#9e9e9e;color:white;}
.snum{font-size:16px;line-height:1;}
.slbl{font-size:7.5px;opacity:.9;margin-top:1px;}
.profile{display:flex;align-items:center;gap:12px;margin:34px 0 12px;padding-right:54px;}
.avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.1);}
.av1{background:radial-gradient(circle,#fce4ec,#f48fb1);}
.av2{background:radial-gradient(circle,#e8f5e9,#81c784);}
.av3{background:radial-gradient(circle,#e3f2fd,#64b5f6);}
.av4{background:radial-gradient(circle,#fff8e1,#ffcc02);}
.av5{background:radial-gradient(circle,#f3e5f5,#ce93d8);}
.av6{background:radial-gradient(circle,#e0f7fa,#4dd0e1);}
.av10{background:radial-gradient(circle,#fbe9e7,#ff8a65);}
.av10{background:radial-gradient(circle,#f5f5f5,#bdbdbd);}
.pname{font-size:15px;font-weight:800;color:#0f1f4a;}
.pig a{color:#4a6fa5;font-weight:700;font-size:12px;text-decoration:none;}
.pig a:hover{text-decoration:underline;}
.pcat{font-size:10px;color:#999;margin-top:3px;line-height:1.5;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px;}
.stat{background:#f7f8fb;border-radius:8px;padding:7px 5px;text-align:center;}
.slabel{font-size:8.5px;color:#aaa;font-weight:700;text-transform:uppercase;margin-bottom:3px;}
.sval{font-size:12px;font-weight:800;color:#0f1f4a;line-height:1;}
.match-bars{margin-bottom:10px;}
.mbar-row{display:flex;align-items:center;gap:7px;margin-bottom:4px;}
.mbar-label{font-size:9px;color:#aaa;width:60px;flex-shrink:0;font-weight:700;}
.mbar-track{flex:1;height:6px;background:#f0f0f0;border-radius:6px;overflow:hidden;}
.mbar-fill{height:100%;border-radius:6px;}
.fill-cat{background:linear-gradient(90deg,#e8b84b,#f0a500);}
.fill-kw{background:linear-gradient(90deg,#1e88e5,#42a5f5);}

.fill-collab{background:linear-gradient(90deg,#8e24aa,#ce93d8);}
.fill-scale{background:linear-gradient(90deg,#ef6c00,#ffa726);}
.mbar-pts{font-size:9px;font-weight:800;color:#555;width:26px;text-align:right;flex-shrink:0;}
.why{border-top:1px solid #f0f0f0;padding-top:10px;}
.why-title{font-size:10px;font-weight:800;color:#0f1f4a;margin-bottom:7px;display:flex;align-items:center;gap:4px;}
.why-title::before{content:'';display:inline-block;width:3px;height:11px;background:#e8b84b;border-radius:2px;}
.why-list{display:flex;flex-direction:column;gap:4px;}
.why-item{font-size:11px;color:#444;line-height:1.55;display:flex;gap:5px;align-items:flex-start;}
.why-check{color:#e8b84b;font-weight:900;flex-shrink:0;font-size:10px;margin-top:1px;}
.mkw{background:#fff9e6;color:#e65100;font-weight:700;padding:0 2px;border-radius:3px;font-size:10px;}
.empty{text-align:center;padding:70px 20px;color:#ccc;}
.empty .eicon{font-size:56px;margin-bottom:14px;}
.empty p{font-size:14px;line-height:1.8;}
@media(max-width:700px){.search-row{flex-direction:column;}.infl-grid{grid-template-columns:1fr;}.stats{grid-template-columns:repeat(2,1fr);}.header{padding:16px;}.container{padding:10px;}}
</style>
</head>

function analyzeBrand(brandName) {
  const name = brandName.trim();
  if (!name) return null;
  const key = name.toLowerCase().replace(/\\s+/g,'').replace(/[()（）·]/g,'');

  // 1. 50개사 BRANDS 정확 매핑
  const sentMatch = BRANDS.find(b => {
    const bk = b.brand.toLowerCase().replace(/\\s+/g,'').replace(/[()（）·]/g,'');
    return bk === key || bk.includes(key) || key.includes(bk);
  });
  if (sentMatch) {
    const p = catFromSentBrand(sentMatch);
    return {...p, brand:name, confidence:'exact'};
  }

  // 2. BRAND_DB 정확 매핑
  if (BRAND_DB[name]) return {...BRAND_DB[name], brand:name, confidence:'exact'};
  // 키 소문자 매핑
  const dbKey = Object.keys(BRAND_DB).find(k => k.toLowerCase().replace(/\\s+/g,'') === key);
  if (dbKey) return {...BRAND_DB[dbKey], brand:name, confidence:'alias'};

  // 3. 부분 매칭 (포함 관계)
  const partialKey = Object.keys(BRAND_DB).find(k => {
    const kk = k.toLowerCase().replace(/\\s+/g,'');
    return kk.length>=2 && (key.includes(kk) || kk.includes(key));
  });
  if (partialKey) return {...BRAND_DB[partialKey], brand:name, confidence:'alias'};

  // 4. 이름 키워드 추론
  const inferred = inferFromKeyword(key);
  if (inferred) return {...inferred, brand:name, confidence:'keyword'};

  // 5. 브랜드명 추론 실패 → 스킨케어/뷰티 기본 매칭 (K뷰티 플랫폼 특성)
  return {brand:name, cat:'스킨케어', kws:'스킨케어 뷰티 K뷰티 루틴', target:'성분덕후', tone:'리얼리뷰', confidence:'inferred'};
}

function catFromSentBrand(b) {
  const CAT_MAP = {
    '뷰티·스킨케어':'스킨케어','뷰티·더마':'의학더마','뷰티·메이크업':'메이크업',
    '건강·이너뷰티':'이너뷰티','헤어케어':'헤어케어','자연주의·친환경':'친환경비건',
    '생활용품·홈케어':'살림홈케어','육아용품':'육아','바디케어':'스킨케어',
  };
  const PROFILE_MAP = {
    '스킨케어': {kws:b.kw||'스킨케어 세럼 K뷰티',target:'성분덕후',tone:'리얼리뷰'},
    '의학더마':  {kws:b.kw||'더마 피부과 민감피부',target:'성분덕후',tone:'신뢰전문'},
    '메이크업':  {kws:b.kw||'메이크업 색조 K뷰티',target:'2030',tone:'감성라이프'},
    '이너뷰티':  {kws:b.kw||'이너뷰티 콜라겐 영양제',target:'약사의사',tone:'신뢰전문'},
    '헤어케어':  {kws:b.kw||'헤어케어 두피 샴푸',target:'3040',tone:'리얼리뷰'},
    '친환경비건': {kws:b.kw||'비건 친환경 클린뷰티',target:'라이프스타일',tone:'친환경'},
    '살림홈케어': {kws:b.kw||'살림 세제 홈케어',target:'라이프스타일',tone:'공구전문'},
    '육아':      {kws:b.kw||'육아 신생아 유아스킨',target:'3040',tone:'육아맘'},
  };
  const cat = CAT_MAP[b.cat] || '스킨케어';
  return {cat, ...(PROFILE_MAP[cat]||PROFILE_MAP['스킨케어'])};
}

function inferFromKeyword(key) {
  const k = key.toLowerCase();
  // 헤어케어 — 한글 어근 + 영문
  if (k.includes('탈모')||k.includes('두피')||k.includes('헤어')||k.includes('샴푸')||k.includes('모발')||k.includes('트리트먼트')||k.includes('린스')||k.includes('scalp')||k.includes('hair')||k.includes('ryo')||k.includes('kerasys')||k.includes('muto')||k.includes('unove'))
    return {cat:'헤어케어', kws:'탈모 두피케어 헤어케어 샴푸 손상모', target:'3040', tone:'리얼리뷰'};
  // 살림/홈케어
  if (k.includes('살림')||k.includes('세제')||k.includes('청소')||k.includes('세탁')||k.includes('주방')||k.includes('홈케어')||k.includes('생활용품')||k.includes('clean')||k.includes('wash')||k.includes('laundry')||k.includes('방향')||k.includes('탈취')||k.includes('제균'))
    return {cat:'살림홈케어', kws:'살림 세제 청소 홈케어 생활용품', target:'라이프스타일', tone:'공구전문'};
  // 이너뷰티/건강
  if (k.includes('콜라겐')||k.includes('유산균')||k.includes('이너뷰티')||k.includes('건강기능')||k.includes('비타민')||k.includes('영양제')||k.includes('홍삼')||k.includes('면역')||k.includes('글루타치온')||k.includes('다이어트')||k.includes('health')||k.includes('vital')||k.includes('nutrition')||k.includes('nutrione'))
    return {cat:'이너뷰티', kws:'이너뷰티 건강기능식품 콜라겐 영양제 글루타치온', target:'약사의사', tone:'신뢰전문'};
  // 육아
  if (k.includes('육아')||k.includes('신생아')||k.includes('임산부')||k.includes('유아')||k.includes('베이비')||k.includes('baby')||k.includes('infant')||k.includes('kids'))
    return {cat:'육아', kws:'육아 신생아 아기 임산부 육아맘', target:'3040', tone:'육아맘'};
  // 친환경/비건
  if (k.includes('비건')||k.includes('친환경')||k.includes('오가닉')||k.includes('유기농')||k.includes('천연')||k.includes('클린뷰티')||k.includes('제로웨이스트')||k.includes('eco')||k.includes('organic')||k.includes('vegan')||k.includes('natural')||k.includes('earth'))
    return {cat:'친환경비건', kws:'비건 친환경 자연주의 오가닉 클린뷰티', target:'라이프스타일', tone:'친환경'};
  // 더마/의학
  if (k.includes('더마')||k.includes('피부과')||k.includes('의학')||k.includes('아토피')||k.includes('트러블케어')||k.includes('derma')||k.includes('clinic')||k.includes('doctor'))
    return {cat:'의학더마', kws:'더마 피부과 민감피부 트러블케어 진정', target:'성분덕후', tone:'신뢰전문'};
  // 메이크업
  if (k.includes('색조')||k.includes('틴트')||k.includes('파운데이션')||k.includes('아이섀도')||k.includes('쿠션')||k.includes('메이크업')||k.includes('makeup')||k.includes('cosmetic')||k.includes('dasique')||k.includes('laka'))
    return {cat:'메이크업', kws:'메이크업 색조 립 틴트 K뷰티', target:'2030', tone:'감성라이프'};
  // 스킨케어
  if (k.includes('선크림')||k.includes('spf')||k.includes('자외선')||k.includes('토너')||k.includes('세럼')||k.includes('앰플')||k.includes('수분크림')||k.includes('보습')||k.includes('미백')||k.includes('skin')||k.includes('serum')||k.includes('toner')||k.includes('essence'))
    return {cat:'스킨케어', kws:'스킨케어 세럼 토너 수분케어 K뷰티', target:'성분덕후', tone:'리얼리뷰'};
  // ★ 기본값 — DB 없어도 스킨케어/뷰티로 매칭 (K뷰티 플랫폼)
  return {cat:'스킨케어', kws:'스킨케어 뷰티 K뷰티 루틴', target:'성분덕후', tone:'리얼리뷰'};
}

// v10: DB에 없는 브랜드 → 실시간 웹 서치로 분류
async function analyzeWithSearch(brandName) {
  // 로딩 표시
  const card = document.getElementById('analysis-card');
  card.className = 'analysis-card visible ac-unknown';
  card.innerHTML = '<div style="padding:12px;text-align:center;color:#9c27b0;font-weight:700;">🌐 ' + brandName + ' 실시간 검색 중...</div>';

  try {
    const resp = await fetch('/analyze', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({brand: brandName})
    });
    const data = await resp.json();
    if (data.cat) {
      lastAnalysis = {...data, confidence: data.confidence||'search_mid'};
      renderAnalysisCard(lastAnalysis);
      // 자동 매칭 실행
      runMatch(lastAnalysis);
    }
  } catch(e) {
    // 검색 실패 시 로컬 추론 결과 유지
    renderAnalysisCard(lastAnalysis);
  }
}

function renderAnalysisCard(a) {
  const card = document.getElementById('analysis-card');
  if (!a || !a.brand) { card.className='analysis-card'; return; }

  const ci = CONF_INFO[a.confidence] || CONF_INFO.unknown;

  if (a.confidence === 'unknown') {
    // 카테고리 선택 UI
    card.className = 'analysis-card visible ac-unknown';
    card.innerHTML =
      '<div style="width:100%">' +
      '<div class="ac-title-warn">⚠️ "'+a.brand+'" — 브랜드 DB에 없습니다. 카테고리를 직접 선택해주세요.</div>' +
      '<div class="cat-btns" style="margin-top:8px">' +
      Object.keys(CAT_PROFILES).map(cat =>
        '<button class="cat-btn" onclick="selectCat(\\''+cat+'\\')">'+(CAT_LABELS[cat]||cat)+'</button>'
      ).join('') +
      '</div></div>';
  } else {
    // 자동 분석 성공
    card.className = 'analysis-card visible ac-found';
    let html = '<span class="ac-title">자동 분석:</span>';
    html += '<span class="ac-tag tag-cat">'+(CAT_LABELS[a.cat]||a.cat)+'</span>';
    if (a.target) html += '<span class="ac-tag tag-target">👥 '+(TARGET_LABELS[a.target]||a.target)+'</span>';
    if (a.tone)   html += '<span class="ac-tag tag-tone">🎭 '+(TONE_LABELS[a.tone]||a.tone)+'</span>';
    if (a.kws) a.kws.split(/\\s+/).slice(0,4).forEach(k => {
      if (k.length>=2) html += '<span class="ac-tag tag-kw">#'+k+'</span>';
    });
    html += '<span class="conf-label" style="color:'+ci.color+'">'+ci.label+'</span>';
    card.innerHTML = html;
  }
}

function selectCat(cat) {
  manualCatSelected = cat;
  const p = CAT_PROFILES[cat];
  const brandName = document.getElementById('brand-input').value.trim();
  lastAnalysis = {...p, brand:brandName, confidence:'selected'};

  // 선택 버튼 활성화
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.includes(CAT_LABELS[cat].replace(/^./,'')));
  });

  // 선택 완료 표시 업데이트
  const card = document.getElementById('analysis-card');
  card.className = 'analysis-card visible ac-found';
  const ci = CONF_INFO['selected'];
  let html = '<span class="ac-title">선택된 카테고리:</span>';
  html += '<span class="ac-tag tag-cat">'+(CAT_LABELS[cat]||cat)+'</span>';
  html += '<span class="ac-tag tag-target">👥 '+(TARGET_LABELS[p.target]||p.target)+'</span>';
  html += '<span class="ac-tag tag-tone">🎭 '+(TONE_LABELS[p.tone]||p.tone)+'</span>';
  html += '<span class="conf-label" style="color:'+ci.color+'">'+ci.label+'</span>';
  html += '<button style="margin-left:auto;padding:6px 14px;background:#0f1f4a;color:white;border:none;border-radius:10px;font-size:12px;font-weight:800;cursor:pointer;" onclick="runSearch()">▶ 이 카테고리로 매칭 시작</button>';
  card.innerHTML = html;
}

function parseF(s){if(!s)return 0;s=String(s).replace(/\\s/g,'');const m=s.match(/[\\d.]+/);if(!m)return 0;const n=parseFloat(m[0]);return s.includes('만')?n*10000:n;}
function getGrade(s){if(s>=80)return{g:'S',lbl:'최우선',cls:'gs'};if(s>=65)return{g:'A',lbl:'강력추천',cls:'ga'};if(s>=50)return{g:'B',lbl:'추천',cls:'gb'};return{g:'C',lbl:'참고',cls:'gc'};}
function getAvatar(cat){if(/헤어|탈모/.test(cat))return{e:'💆',c:'av2'};if(/건강|약사|이너|영양|면역/.test(cat))return{e:'💊',c:'av3'};if(/살림|세제|홈케어|인테리어/.test(cat))return{e:'🧹',c:'av4'};if(/육아|맘|신생아/.test(cat))return{e:'👶',c:'av5'};if(/친환경|비건|자연/.test(cat))return{e:'🌿',c:'av10'};if(/색조|메이크업|GRWM/.test(cat))return{e:'🎨',c:'av1'};if(/더마|피부과|의학/.test(cat))return{e:'🔬',c:'av3'};return{e:'💄',c:'av1'};}

function scoreOne(infl, analysis) {
  const hay=[infl.category||'',infl.note||'',infl.giveaway||'',infl.fit||''].join(' ').toLowerCase();
  const catKw=CAT_KW[analysis.cat]||[];
  const userKw=(analysis.kws||'').split(/\\s+/).filter(k=>k.length>=2);
  const catM=catKw.filter(k=>hay.includes(k.toLowerCase()));
  const catScore=catM.length>=4?35:catM.length>=2?25:catM.length===1?15:0;
  if(catScore===0)return null;
  const kwM=userKw.filter(k=>hay.includes(k.toLowerCase()));
  const kwScore=kwM.length>0?Math.min(25,kwM.length*9):Math.round(catScore*0.4);
  let targetScore=0,toneScore=0;
  if(analysis.target&&TARGET_KW[analysis.target]){const tM=TARGET_KW[analysis.target].filter(k=>hay.includes(k.toLowerCase()));targetScore=Math.min(10,tM.length*4);}
  if(analysis.tone&&TONE_KW[analysis.tone]){const nM=TONE_KW[analysis.tone].filter(k=>hay.includes(k.toLowerCase()));toneScore=Math.min(10,nM.length*4);}
  const gw=infl.giveaway||'',nt=infl.note||'';
  let collabScore=0;
  if(gw.includes('매우 활발')||nt.includes('최다')||nt.includes('풍부')||gw.includes('다수'))collabScore=15;
  else if(gw.includes('공구')||nt.includes('공구'))collabScore=8;
  const f=parseF(infl.followers);
  const scaleScore=f>=200000?5:f>=100000?4:f>=50000?3:f>=10000?2:1;
  const total=catScore+kwScore+targetScore+toneScore+collabScore+scaleScore;
  const reasons=[];
  if(catM.length>0)reasons.push('카테고리 일치: '+catM.slice(0,3).join(', '));
  if(kwM.length>0)reasons.push('키워드 일치: '+kwM.slice(0,3).join(', '));
  if(targetScore+toneScore>0)reasons.push('타겟·분위기 일치');
  if(collabScore>=15)reasons.push('공구 매우 활발 — 검증된 판매력');
  else if(collabScore>0)reasons.push('공구 이력 있음');
  return{score:total,breakdown:{cat:catScore,kw:kwScore,target:targetScore+toneScore,collab:collabScore,scale:scaleScore},reasons,matchedKws:[...new Set([...catM,...kwM])]};
}

// ─── 검색 실행 ───
function runSearch() {
  const val = document.getElementById('brand-input').value.trim();
  if (!val) { alert('제조사명을 입력하세요.'); return; }

  // 로컬 BRAND_DB 분석
  const a = analyzeBrand(val);
  lastAnalysis = a;

  // DB에서 정확히 찾은 경우만 로컬 결과 사용 (exact / alias)
  if (a && a.cat && (a.confidence === 'exact' || a.confidence === 'alias')) {
    renderAnalysisCard(a);
    const results = DB
      .map(infl => { const r = scoreOne(infl, a); if (!r) return null; return {...infl, ...r}; })
      .filter(Boolean).sort((x, y) => y.score - x.score).slice(0, 12);
    renderResults(a, results);
  } else {
    // DB에 없거나 추론값이면 → 실시간 웹서치 API 호출
    analyzeWithSearch(val);
  }
}

// ─── 결과 렌더링 ───
function renderResults(analysis, results) {
  const area = document.getElementById('result-area');
  if (!results.length) {area.innerHTML='<div class="empty"><div class="eicon">🔍</div><p>해당 카테고리 인플루언서 DB 확장 중 (매일 +30명 추가).</p></div>';return;}
  const allKw=(analysis.kws||'').split(/\\s+/).concat(CAT_KW[analysis.cat]||[]).map(k=>k.toLowerCase()).filter(k=>k.length>=2);
  area.innerHTML=
    '<div class="result-header"><h2>'+analysis.brand+' — 추천 인플루언서 <span style="color:#e8b84b">'+results.length+'명</span></h2>'+
    '<span class="result-sub">'+DB.length+'명 실제 계정 DB · 5차원 자동 매칭 · 점수 높은 순</span></div>'+
    '<div class="legend"><span class="legend-item"><span class="ldot gs">S</span> 최우선(80+)</span><span class="legend-item"><span class="ldot ga">A</span> 강력추천(65~79)</span><span class="legend-item"><span class="ldot gb">B</span> 추천(50~64)</span><span class="legend-item"><span class="ldot gc">C</span> 참고(~49)</span></div>'+
    '<div class="infl-grid">'+results.map((m,i)=>renderCard(m,i+1,allKw)).join('')+'</div>';
}

function pct(v,mx){return Math.round(v/mx*100)+'%';}
function hl(text,kwList){let t=String(text||'');kwList.forEach(k=>{if(k.length<2)return;const re=new RegExp('('+k.replace(/[.*+?^\${}()|[\\]\\\\]/g,'\\\\$&')+')','gi');t=t.replace(re,'<span class="mkw">$1</span>');});return t;}

function renderCard(m,rank,kwList){
  const av=getAvatar(m.category||'');const g=getGrade(m.score);
  const igLink=m.link||(m.ig?'https://www.instagram.com/'+m.ig.replace('@',''):'#');
  const bars=[
    {lbl:'카테고리',v:m.breakdown.cat,mx:35,cls:'fill-cat'},
    {lbl:'키워드',v:m.breakdown.kw,mx:25,cls:'fill-kw'},
    {lbl:'타겟·톤',v:m.breakdown.target,mx:20,cls:'fill-target'},
    {lbl:'공구이력',v:m.breakdown.collab,mx:15,cls:'fill-collab'},
    {lbl:'팔로워',v:m.breakdown.scale,mx:5,cls:'fill-scale'},
  ];
  return '<div class="card grade-'+g.g.toLowerCase()+'">' +
    '<div class="rank-dot">'+rank+'</div>'+
    '<div class="score-ring '+g.cls+'"><div class="snum">'+m.score+'</div><div class="slbl">'+g.lbl+'</div></div>'+
    '<div class="profile"><div class="avatar '+av.c+'">'+av.e+'</div><div>'+
    '<div class="pname">'+(m.name||'').split(' (')[0]+'</div>'+
    '<div class="pig"><a href="'+igLink+'" target="_blank">'+(m.ig||'')+'↗</a></div>'+
    '<div class="pcat">'+hl((m.category||'').substring(0,40),kwList)+'</div></div></div>'+
    '<div class="stats">'+
    '<div class="stat"><div class="slabel">팔로워</div><div class="sval">'+(m.followers||'-')+'</div></div>'+
    '<div class="stat"><div class="slabel">릴스</div><div class="sval">'+(m.reels||'-')+'</div></div>'+
    '<div class="stat"><div class="slabel">등급</div><div class="sval">'+(m.grade||'-')+'등급</div></div>'+
    '<div class="stat"><div class="slabel">점수</div><div class="sval">'+m.score+'</div></div></div>'+
    '<div class="match-bars">'+bars.map(b=>'<div class="mbar-row"><div class="mbar-label">'+b.lbl+'</div><div class="mbar-track"><div class="mbar-fill '+b.cls+'" style="width:'+pct(b.v,b.mx)+'"></div></div><div class="mbar-pts">'+b.v+'</div></div>').join('')+'</div>'+
    '<div class="why"><div class="why-title">이 제조사에 적합한 이유</div><div class="why-list">'+
    m.reasons.slice(0,3).map(r=>'<div class="why-item"><span class="why-check">✓</span>'+hl(r,kwList)+'</div>').join('')+
    (m.note?'<div class="why-item"><span class="why-check">✓</span>'+hl((m.note||'').substring(0,55),kwList)+'</div>':'')+
    '</div></div></div>';
}

// ─── 빠른 선택 ───
document.getElementById('quick-grid').innerHTML=BRANDS.map(b=>
  '<button class="qbtn" onclick="quickPick('+b.no+')">'+b.brand+'</button>').join('');

function quickPick(no){
  const b=BRANDS.find(x=>x.no===no);if(!b)return;
  document.getElementById('brand-input').value=b.brand;
  onBrandInput(b.brand);
  if(lastAnalysis&&lastAnalysis.cat) setTimeout(runSearch,50);
}
